<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registry | AegisLib - Library Management System</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/table.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .setting-section-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="app-layout">
        <div class="content-body">
            <div class="card">
                <div class="card-title">
                    <span>Library Staff Registry</span>
                    <button class="btn btn-primary" id="add-staff-btn" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">
                        <i class="fas fa-user-plus"></i> Add Staff
                    </button>
                </div>
                <p class="setting-section-desc">Manage system access credentials, roles, and administrative statuses for staff operators.</p>
                
                <div class="table-wrapper" style="margin-bottom: 0;">
                    <table class="data-table" id="staff-table">
                        <thead>
                            <tr>
                                <th>Staff ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Branch</th>
                                <th>Status</th>
                                <th style="width: 100px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staff-tbody">
                            <!-- Loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form (Add/Edit Staff) -->
    <div class="modal-overlay" id="staff-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title-text">Add Staff Operator</h3>
                <span class="modal-close" data-dismiss="modal">&times;</span>
            </div>
            <form id="staff-form" novalidate>
                <input type="hidden" name="id" id="staff-id-field">
                <div class="modal-content">
                    <div class="form-group">
                        <label class="form-label" for="staff-name">Staff Name</label>
                        <input class="form-control" type="text" id="staff-name" name="name" required>
                        <span class="form-error-msg">Staff name is required.</span>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="staff-email">Email Address</label>
                            <input class="form-control" type="email" id="staff-email" name="email" required>
                            <span class="form-error-msg">Please enter a valid email address.</span>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="staff-password">Password</label>
                            <input class="form-control" type="text" id="staff-password" name="password" placeholder="e.g. staff123" required>
                            <span class="form-error-msg">Password is required.</span>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="staff-role">Access Role</label>
                            <select class="form-control" id="staff-role" name="role" required>
                                <option value="Staff">Staff Operator</option>
                                <option value="Admin">Administrator</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="staff-branch">Registered Branch</label>
                            <select class="form-control" id="staff-branch" name="branchId" required>
                                <option value="">Select Branch</option>
                            </select>
                            <span class="form-error-msg">Branch selection is required.</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="staff-status">Account Access Status</label>
                        <select class="form-control" id="staff-status" name="status" required>
                            <option value="Active">Active</option>
                            <option value="Suspended">Suspended</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-staff-btn">Save Operator</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script modules -->
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/staff.js"></script>
</body>
</html>
