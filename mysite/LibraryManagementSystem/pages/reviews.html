<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews & Ratings | AegisLib - Library Management System</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/table.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="app-layout">
        <div class="content-body">
            <!-- Table Action Controls -->
            <div class="table-header-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" class="form-control" placeholder="Search by book, reviewer, comment...">
                </div>
                <div class="filter-actions">
                    <select id="filter-rating" class="form-control" style="width: 140px; padding-top:0.5rem; padding-bottom:0.5rem;">
                        <option value="">All Ratings</option>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>
                    <button class="btn btn-primary" id="add-review-btn">
                        <i class="fas fa-star"></i> Submit Review
                    </button>
                </div>
            </div>

            <!-- Reviews Datatable -->
            <div class="table-wrapper">
                <table class="data-table" id="reviews-table">
                    <thead>
                        <tr>
                            <th class="sortable asc" data-column="id">Review ID</th>
                            <th class="sortable" data-column="title">Book Title</th>
                            <th>Reviewer</th>
                            <th>Rating</th>
                            <th>Review Date</th>
                            <th>Comments</th>
                            <th style="width: 100px; text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reviews-tbody">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination footer -->
            <div class="pagination-wrapper">
                <div class="pagination-info" id="pagination-info">Showing 0 to 0 of 0 entries</div>
                <div class="pagination-controls" id="pagination-controls">
                    <!-- Buttons loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form (Add Review) -->
    <div class="modal-overlay" id="review-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Submit Book Review</h3>
                <span class="modal-close" data-dismiss="modal">&times;</span>
            </div>
            <form id="review-form" novalidate>
                <div class="modal-content">
                    <div class="form-group">
                        <label class="form-label" for="review-member">Select Member Reviewer</label>
                        <select class="form-control" id="review-member" name="memberId" required>
                            <option value="">Select Member</option>
                        </select>
                        <span class="form-error-msg">Member reviewer selection is required.</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="review-book">Select Book Title</label>
                        <select class="form-control" id="review-book" name="bookId" required>
                            <option value="">Select Book Title</option>
                        </select>
                        <span class="form-error-msg">Book selection is required.</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="review-rating">Rating (1 to 5 Stars)</label>
                        <select class="form-control" id="review-rating" name="rating" required>
                            <option value="5">★★★★★ (5 Stars)</option>
                            <option value="4">★★★★☆ (4 Stars)</option>
                            <option value="3">★★★☆☆ (3 Stars)</option>
                            <option value="2">★★☆☆☆ (2 Stars)</option>
                            <option value="1">★☆☆☆☆ (1 Star)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="review-comment">Review Comments</label>
                        <textarea class="form-control" id="review-comment" name="comment" placeholder="Write your review remarks..." required></textarea>
                        <span class="form-error-msg">Comments are required.</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Review</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script modules -->
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/reviews.js"></script>
</body>
</html>
