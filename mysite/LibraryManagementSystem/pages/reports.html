<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics | AegisLib - Library Management System</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/table.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <style>
        .reports-nav-card {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            align-items: center;
            justify-content: space-between;
        }

        .reports-menu-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .report-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .report-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--primary-glow);
        }

        .report-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .report-actions {
            display: flex;
            gap: 0.5rem;
        }

        .summary-stats-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .summary-mini-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        /* Print Media Styles */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            #sidebar, #top-navbar, .reports-nav-card, .pagination-wrapper {
                display: none !important;
            }
            #main-container {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .content-body {
                padding: 0 !important;
            }
            .card {
                background: none !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
            }
            .table-wrapper {
                border: none !important;
                box-shadow: none !important;
            }
            .data-table th {
                background: #f1f5f9 !important;
                color: black !important;
                border-bottom: 2px solid #cbd5e1 !important;
            }
            .data-table td {
                border-bottom: 1px solid #e2e8f0 !important;
            }
            .print-header {
                display: block !important;
                text-align: center;
                margin-bottom: 2rem;
                border-bottom: 2px solid var(--primary);
                padding-bottom: 1rem;
            }
        }

        .print-header {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app-layout">
        <div class="content-body">
            <!-- Print Letterhead Placeholder -->
            <div class="print-header">
                <h1 style="font-size: 1.8rem; margin-bottom: 0.25rem;">AegisLib Management System</h1>
                <p style="font-size: 0.85rem; color: #475569;" id="print-timestamp">Generated on: -</p>
                <h2 style="font-size: 1.25rem; margin-top: 1rem; text-transform: uppercase;" id="print-report-title">Report Title</h2>
            </div>

            <!-- Report Navigation and Export Actions -->
            <div class="card reports-nav-card">
                <div class="reports-menu-tabs">
                    <button class="report-btn active" data-report="most-borrowed">
                        <i class="fas fa-fire"></i> Most Borrowed
                    </button>
                    <button class="report-btn" data-report="top-members">
                        <i class="fas fa-medal"></i> Top Members
                    </button>
                    <button class="report-btn" data-report="overdue-list">
                        <i class="fas fa-exclamation-triangle"></i> Overdue List
                    </button>
                    <button class="report-btn" data-report="fine-statement">
                        <i class="fas fa-file-invoice-dollar"></i> Fine Statement
                    </button>
                    <button class="report-btn" data-report="inventory-status">
                        <i class="fas fa-warehouse"></i> Inventory Status
                    </button>
                </div>
                <div class="report-actions">
                    <button class="btn btn-secondary" id="export-csv-btn" title="Export as CSV">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                    <button class="btn btn-secondary" id="print-report-btn" title="Print Report">
                        <i class="fas fa-print"></i> Print
                    </button>
                </div>
            </div>

            <!-- Mini Summary Boxes (loaded dynamically matching active tab) -->
            <div class="summary-stats-box" id="report-summary-box">
                <!-- dynamic stats cards -->
            </div>

            <!-- Report Content table -->
            <div class="card">
                <h3 class="card-title" id="report-card-title">Most Borrowed Books</h3>
                <div class="table-wrapper" style="margin-bottom: 0;">
                    <table class="data-table" id="reports-table">
                        <thead id="reports-thead">
                            <!-- Injected -->
                        </thead>
                        <tbody id="reports-tbody">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Script modules -->
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/reports.js"></script>
</body>
</html>
