<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Library Seat Booking & Billing System</title>
  
  <!-- Style Sheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Google Fonts (Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Vector Icons Library via CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- ==========================================
       1. LOGIN SECTION
       ========================================== -->
  <section id="login-section" style="display: none;"></section>

  <!-- ==========================================
       2. MAIN APP FRAME (SIDEBAR + CONTENT)
       ========================================== -->
  <div id="app-container" style="display: none;">
    <!-- Sidebar Navigation -->
    <aside id="sidebar-container" class="sidebar"></aside>
    
    <!-- Mobile Sidebar Drawer Backdrop -->
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <!-- Main Workspace Area -->
    <main class="main-content">
      <!-- Top header bar (Title, User, Alerts) -->
      <header id="header-container" class="header"></header>

      <!-- View Content Containers (Toggled via Hash Router) -->
      <div class="content-wrapper">
        <!-- ADMIN VIEWS -->
        <section id="admin-dashboard-view" class="app-view"></section>
        <section id="admin-users-view" class="app-view"></section>
        <section id="admin-seats-view" class="app-view"></section>
        <section id="admin-book-behalf-view" class="app-view"></section>
        <section id="admin-verify-payments-view" class="app-view"></section>
        <section id="admin-billing-view" class="app-view"></section>
        <section id="admin-settings-view" class="app-view"></section>

        <!-- USER VIEWS -->
        <section id="user-dashboard-view" class="app-view"></section>
        <section id="user-book-seat-view" class="app-view"></section>
        <section id="user-bookings-view" class="app-view"></section>
        <section id="user-billing-view" class="app-view"></section>
      </div>
    </main>
  </div>

  <!-- ==========================================
       3. FLOATING SYSTEM TOASTS CONTAINER
       ========================================== -->
  <div id="toast-container"></div>

  <!-- ==========================================
       4. SCRIPTS (Loaded Sequentially for Global Namespace)
       ========================================== -->
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/seats.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/invoices.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
