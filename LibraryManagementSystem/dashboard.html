<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AegisLib - Library Management System</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="./css/table.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
    <div id="app-layout">
        <!-- Sidebar and Top Navbar injected dynamically here -->
        <div class="content-body">
            <!-- KPI Metrics Row -->
            <div class="dashboard-grid">
                <div class="card kpi-card">
                    <div class="kpi-icon"><i class="fas fa-book"></i></div>
                    <div class="kpi-details">
                        <span class="kpi-value" id="kpi-total-books">-</span>
                        <span class="kpi-label">Total Books</span>
                    </div>
                </div>
                <div class="card kpi-card available">
                    <div class="kpi-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="kpi-details">
                        <span class="kpi-value" id="kpi-available-books">-</span>
                        <span class="kpi-label">Available Copies</span>
                    </div>
                </div>
                <div class="card kpi-card info">
                    <div class="kpi-icon"><i class="fas fa-exchange-alt"></i></div>
                    <div class="kpi-details">
                        <span class="kpi-value" id="kpi-issued-books">-</span>
                        <span class="kpi-label">Issued Copies</span>
                    </div>
                </div>
                <div class="card kpi-card overdue">
                    <div class="kpi-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="kpi-details">
                        <span class="kpi-value" id="kpi-overdue-loans">-</span>
                        <span class="kpi-label">Overdue Loans</span>
                    </div>
                </div>
                <div class="card kpi-card reservations">
                    <div class="kpi-icon"><i class="fas fa-bookmark"></i></div>
                    <div class="kpi-details">
                        <span class="kpi-value" id="kpi-reservations">-</span>
                        <span class="kpi-label">Active Holds</span>
                    </div>
                </div>
                <div class="card kpi-card">
                    <div class="kpi-icon"><i class="fas fa-users"></i></div>
                    <div class="kpi-details">
                        <span class="kpi-value" id="kpi-total-members">-</span>
                        <span class="kpi-label">Total Members</span>
                    </div>
                </div>
                <div class="card kpi-card fines">
                    <div class="kpi-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                    <div class="kpi-details">
                        <span class="kpi-value" id="kpi-fines-collected">-</span>
                        <span class="kpi-label">Outstanding Fines</span>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="charts-grid">
                <div class="card">
                    <div class="card-title">
                        <span>Borrowing Volume Over Time</span>
                        <i class="fas fa-chart-line" style="color: var(--text-muted);"></i>
                    </div>
                    <div class="chart-container">
                        <div class="chart-tooltip" id="line-chart-tooltip"></div>
                        <svg id="line-chart-svg" class="chart-svg" viewBox="0 0 600 240"></svg>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">
                        <span>Books by Category</span>
                        <i class="fas fa-chart-pie" style="color: var(--text-muted);"></i>
                    </div>
                    <div class="chart-container" style="flex-direction: column;">
                        <svg id="donut-chart-svg" class="chart-svg" viewBox="0 0 200 200" style="max-height: 180px;"></svg>
                        <div class="chart-legend" id="donut-legend"></div>
                    </div>
                </div>
            </div>

            <!-- Recent Loans Table -->
            <div class="card">
                <div class="card-title" style="margin-bottom: 1.25rem;">
                    <span>Recent Circulation Activity</span>
                    <a href="./pages/loans.html" class="btn btn-secondary" style="padding: 0.35rem 0.75rem; font-size: 0.8rem;">
                        View All
                    </a>
                </div>
                <div class="table-wrapper">
                    <table class="data-table" id="recent-loans-table">
                        <thead>
                            <tr>
                                <th>Book Title</th>
                                <th>Member</th>
                                <th>Issue Date</th>
                                <th>Due Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="recent-loans-tbody">
                            <!-- Populated by JavaScript -->
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-secondary);">Loading activity...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Script modules -->
    <script src="./js/storage.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/dashboard.js"></script>
</body>
</html>
