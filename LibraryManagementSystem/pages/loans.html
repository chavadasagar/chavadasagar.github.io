<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkouts Desk | AegisLib - Library Management System</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/table.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="app-layout">
        <div class="content-body">
            <!-- Table Action Controls -->
            <div class="table-header-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" class="form-control" placeholder="Search by member, title, barcode...">
                </div>
                <div class="filter-actions">
                    <select id="filter-status" class="form-control" style="width: 140px; padding-top:0.5rem; padding-bottom:0.5rem;">
                        <option value="">All Loans</option>
                        <option value="Issued">Issued</option>
                        <option value="Overdue">Overdue</option>
                        <option value="Returned">Returned</option>
                    </select>
                    <button class="btn btn-primary" id="issue-book-btn">
                        <i class="fas fa-plus"></i> Issue Book (Checkout)
                    </button>
                </div>
            </div>

            <!-- Checkouts Desk Datatable -->
            <div class="table-wrapper">
                <table class="data-table" id="loans-table">
                    <thead>
                        <tr>
                            <th class="sortable asc" data-column="id">Loan ID</th>
                            <th>Barcode</th>
                            <th class="sortable" data-column="title">Book Title</th>
                            <th>Borrower</th>
                            <th class="sortable" data-column="issueDate">Issued</th>
                            <th>Due Date</th>
                            <th>Returned</th>
                            <th>Fine</th>
                            <th>Status</th>
                            <th style="width: 120px; text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="loans-tbody">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination footer -->
            <div class="pagination-wrapper">
                <div class="pagination-info" id="pagination-info">Showing 0 to 0 of 0 entries</div>
                <div class="pagination-controls" id="pagination-controls">
                    <!-- Buttons loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form (Issue Book / Checkout) -->
    <div class="modal-overlay" id="issue-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Book Issue Terminal</h3>
                <span class="modal-close" data-dismiss="modal">&times;</span>
            </div>
            <form id="issue-form" novalidate>
                <div class="modal-content">
                    <div class="form-group">
                        <label class="form-label" for="issue-member">Select Member Borrower</label>
                        <select class="form-control" id="issue-member" name="memberId" required>
                            <option value="">Select Borrower</option>
                        </select>
                        <span class="form-error-msg">Member selection is required.</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="issue-copy">Select Book Copy (Barcode)</label>
                        <select class="form-control" id="issue-copy" name="bookCopyId" required>
                            <option value="">Select Copy Barcode</option>
                        </select>
                        <span class="form-error-msg">Copy barcode selection is required.</span>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="issue-date">Issue Date</label>
                            <input class="form-control" type="date" id="issue-date" name="issueDate" required readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="due-date">Due Date</label>
                            <input class="form-control" type="date" id="due-date" name="dueDate" required readonly>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Process Checkout</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script modules -->
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/loans.js"></script>
</body>
</html>
