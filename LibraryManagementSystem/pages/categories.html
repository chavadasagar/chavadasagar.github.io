<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | AegisLib - Library Management System</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/table.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div id="app-layout">
        <div class="content-body">
            <!-- Table Action Controls -->
            <div class="table-header-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" class="form-control" placeholder="Search categories...">
                </div>
                <button class="btn btn-primary" id="add-category-btn">
                    <i class="fas fa-plus"></i> Add Category
                </button>
            </div>

            <!-- Categories Datatable -->
            <div class="table-wrapper">
                <table class="data-table" id="categories-table">
                    <thead>
                        <tr>
                            <th class="sortable asc" data-column="id">Category ID</th>
                            <th class="sortable" data-column="name">Name</th>
                            <th>Description</th>
                            <th style="width: 100px; text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categories-tbody">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination footer -->
            <div class="pagination-wrapper">
                <div class="pagination-info" id="pagination-info">Showing 0 to 0 of 0 entries</div>
                <div class="pagination-controls" id="pagination-controls">
                    <!-- Buttons loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form (Add/Edit Category) -->
    <div class="modal-overlay" id="category-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title-text">Add New Category</h3>
                <span class="modal-close" data-dismiss="modal">&times;</span>
            </div>
            <form id="category-form" novalidate>
                <input type="hidden" name="id" id="category-id-field">
                <div class="modal-content">
                    <div class="form-group">
                        <label class="form-label" for="category-name">Category Name</label>
                        <input class="form-control" type="text" id="category-name" name="name" placeholder="e.g. Science Fiction" required>
                        <span class="form-error-msg">Category name is required.</span>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="category-desc">Description</label>
                        <textarea class="form-control" id="category-desc" name="description" placeholder="Write a short description..." required></textarea>
                        <span class="form-error-msg">Description is required.</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-category-btn">Save Category</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script modules -->
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/categories.js"></script>
</body>
</html>
